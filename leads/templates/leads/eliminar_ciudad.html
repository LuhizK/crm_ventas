<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Ciudad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow border-danger" style="max-width: 400px;">
        <div class="card-body text-center p-4">
            <h3 class="text-danger mb-3">¿Eliminar Registro?</h3>
            <p>Estás a punto de eliminar la ciudad: <strong>{{ ciudad.ciudad }}</strong>.</p>
            <p class="text-muted small">Esta acción no se puede deshacer.</p>
            
            <form method="POST" class="mt-4">
                {% csrf_token %}
                <a href="{% url 'listar_ciudades' %}" class="btn btn-secondary me-2">Cancelar</a>
                <button type="submit" class="btn btn-danger">Sí, Eliminar</button>
            </form>
        </div>
    </div>
</body>
</html>
