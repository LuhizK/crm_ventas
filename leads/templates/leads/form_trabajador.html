<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if es_edicion %}Modificar Trabajador{% else %}Ingresar Trabajador{% endif %} - DeuDoor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <div class="container mt-5" style="max-width: 650px;">
        <div class="card shadow-sm border-0 p-4 bg-white border-top border-success border-4">
            <h2 class="text-dark fw-bold mb-1">
                {% if es_edicion %}<i class="bi bi-pencil-square text-success"></i> Actualizar Perfil Laboral{% else %}<i class="bi bi-person-plus text-success"></i> Ingresar Trabajador{% endif %}
            </h2>
            <p class="text-muted mb-4">Seleccione la persona y asigne su rol dentro de la empresa.</p>
            
            <form method="post">
                {% csrf_token %}
                
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                    <div class="text-danger small mt-1 fw-bold">
                        {{ field.errors|striptags }}
                    </div>
                    {% endif %}
                </div>
                {% endfor %}

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-success flex-grow-1 fw-bold">
                        <i class="bi bi-save"></i> Guardar Asignación
                    </button>
                    <a href="{% url 'listar_trabajadores' %}" class="btn btn-outline-secondary px-4">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
