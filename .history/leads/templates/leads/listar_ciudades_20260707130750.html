<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Administrar Ciudades</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container bg-white p-4 shadow-sm rounded">
        <div class="d-flex justify-content-between mb-4">
            <h2>Ciudades</h2>
            <a href="{% url 'crear_ciudad' %}" class="btn btn-primary">Agregar Nueva Ciudad</a>
        </div>
        
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th class="text-end">Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for ciudad in ciudades %}
                <tr>
                    <td>{{ ciudad.ciudad }}</td>
                    <td class="text-end">
                        <a href="{% url 'editar_ciudad' ciudad.id_ciudad %}" class="btn btn-sm btn-warning">Editar</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="{% url 'panel_control' %}" class="btn btn-secondary mt-3">Volver al Panel</a>
    </div>
</body>
</html>
