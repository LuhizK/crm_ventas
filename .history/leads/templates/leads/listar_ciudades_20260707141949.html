<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrar Ciudades - DeuDoor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center bg-white p-4 shadow-sm rounded-3 mb-4 border-start border-info border-4">
            <div>
                <h2 class="text-info m-0 fw-bold"><i class="bi bi-geo-alt"></i> Ciudades Registradas</h2>
                <p class="text-muted m-0">Zonas geográficas de operación.</p>
            </div>
            <a href="{% url 'crear_ciudad' %}" class="btn btn-info text-white fw-bold">
                <i class="bi bi-plus-circle-fill"></i> Registrar Nueva Ciudad
            </a>
        </div>

        <div class="card shadow-sm border-0 bg-white p-4">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Nombre de la Ciudad</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for ciudad in ciudades %}
                    <tr>
                        <td class="fw-bold text-dark">{{ ciudad.ciudad }}</td>
                        <td class="text-end">
                            <a href="{% url 'editar_ciudad' ciudad.id_ciudad %}" class="btn btn-sm btn-outline-info fw-bold">
                                <i class="bi bi-pencil-square"></i> Editar
                            </a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="2" class="text-center py-4 text-muted">
                            <i class="bi bi-info-circle fs-3 d-block mb-2"></i> No hay ciudades registradas.
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            
            <div class="mt-4">
                <a href="{% url 'panel_control' %}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Volver al Panel Principal
                </a>
            </div>
        </div>
    </div>

</body>
</html>
