<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% if es_edicion %}Editar Ciudad{% else %}Nueva Ciudad{% endif %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container bg-white p-4 shadow-sm rounded" style="max-width: 500px;">
        <h2 class="mb-4">{% if es_edicion %}Editar Ciudad{% else %}Registrar Ciudad{% endif %}</h2>
        
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success w-100">Guardar Cambios</button>
            <a href="{% url 'listar_ciudades' %}" class="btn btn-link w-100 mt-2">Cancelar</a>
        </form>
    </div>
</body>
</html>
