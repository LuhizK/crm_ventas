<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Lead - DeuDoor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 900px;">
        <div class="card shadow-sm border-0 p-4 bg-white border-top border-primary border-4">
            <h2 class="text-primary fw-bold mb-4"><i class="bi bi-pencil-square"></i> Gestión de Lead #{{ lead.id_lead }}</h2>
            
            <form method="post">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-6">
                        <h5 class="text-secondary border-bottom pb-2">Información Personal</h5>
                        {{ form_p.as_p }}
                    </div>
                    <div class="col-md-6">
                        <h5 class="text-secondary border-bottom pb-2">Configuración Operativa</h5>
                        {{ form_l.as_p }}
                        
                        <h5 class="text-secondary mt-4">Observaciones</h5>
                        <p class="text-muted small">{{ obs.observacion|default:"Sin observaciones registradas." }}</p>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary px-5 fw-bold">Guardar Cambios</button>
                    <a href="{% url 'listar_leads' %}" class="btn btn-outline-secondary">Volver al Historial</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
