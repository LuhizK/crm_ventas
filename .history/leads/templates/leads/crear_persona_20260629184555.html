<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Persona</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4">
            <h2 class="mb-4">Registrar Nueva Persona</h2>
            
            <form method="post">
    {% csrf_token %}
    
    <div class="row">
        {% for field in form %}
            <div class="col-md-6 mb-3"> <label class="form-label">{{ field.label }}</label>
                {{ field }}
                
                {% if field.errors %}
                    <div class="text-danger small">
                        {{ field.errors }}
                    </div>
                {% endif %}
            </div>
        {% endfor %}
    </div>
    
    <button type="submit" class="btn btn-primary">Guardar Persona</button>
</form>
        </div>
    </div>
</body>
</html>
